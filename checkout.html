<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Checkout</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:40px;
border-radius:10px;
width:400px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:black;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#333;
}

</style>

</head>

<body>

<div class="container">

<h2>Checkout</h2>

<input type="text" placeholder="Card Name">

<input type="text" placeholder="Card Number">

<input type="text" placeholder="Expiry Date">

<input type="text" placeholder="CVV">

<a href="success.html">
<button>Pay Now</button>
</a>

</div>

</body>
</html>
